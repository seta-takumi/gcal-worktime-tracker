<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>設定 - gcal-worktime-tracker</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>就業時間帯の設定</h1>
    <form id="options-form">
      <div class="form-group">
        <label for="week-start-day">集計開始曜日</label>
        <select id="week-start-day" name="weekStartDay">
          <option value="1">月曜日（月〜金）</option>
          <option value="2">火曜日（火〜月）</option>
          <option value="3">水曜日（水〜火）</option>
          <option value="4">木曜日（木〜水）</option>
          <option value="5">金曜日（金〜木）</option>
        </select>
      </div>
      <div class="form-group">
        <label for="week-count">集計週数</label>
        <select id="week-count" name="weekCount">
          <option value="1">1週間</option>
          <option value="2">2週間</option>
          <option value="3">3週間</option>
          <option value="4">4週間</option>
        </select>
      </div>
      <div class="form-group">
        <label for="start">開始時刻</label>
        <input type="time" id="start" name="start" value="10:00" required>
      </div>
      <div class="form-group">
        <label for="end">終了時刻</label>
        <input type="time" id="end" name="end" value="19:00" required>
      </div>
      <div class="form-group form-group--block">
        <label for="exclude-keywords">除外ワード（1行1ワード）</label>
        <textarea id="exclude-keywords" name="excludeKeywords" rows="4" placeholder="例: 1on1&#10;雑談"></textarea>
        <div class="hint">タイトルにこのワードを含む予定は計算から除外されます。</div>
      </div>
      <div id="validation-error" class="error-msg" hidden>
        開始時刻は終了時刻より前に設定してください。
      </div>
      <button type="submit" class="save-btn">保存</button>
      <div id="status-msg" class="status-msg" hidden></div>
    </form>
  </div>
  <script src="options.js"></script>
</body>
</html>
